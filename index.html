<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRandom.stuff</title>
    <style>
        body {
            font-family: 'Patrick Hand', cursive;
            text-align: center;
            margin-top: 50px;
            font-size: 30px;
        }
        .btn {
            padding: 12px 25px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn2 {
            padding: 12px 25px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn2:hover {
            background-color: darkgreen;
            transform: scale(1.05);
        }
        .btn3 {
            padding: 12px 25px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn3:hover {
            background-color: darkred;
            transform: scale(1.05);
        }
        .btn:hover {
            background-color: darkblue;
            transform: scale(1.05);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 kolom: kiri tengah kanan */
            gap: 15px;
        }
    </style>
</head>
<body>
    <h1>ZRandom.stuff</h1>
    <p>
        Made by Zafran
    </p>
    <div class="container">
        <button class="btn" onclick="window.open(' https://z4rn-cmd.github.io/Random-fact-generator/', '_blank')" >Random Fact Generator</button>
        <button class="btn2" onclick="window.open('https://z4rn-cmd.github.io/Search-it', '_blank')" >Search it</button>
        <button class="btn3" onclick="window.open('https://z4rn-cmd.github.io/Daily-Random-Items/', '_blank')" >Daily random items</button>
    </div>
</body>
</html>
